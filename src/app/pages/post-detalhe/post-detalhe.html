<div class="espacador-navbar"></div>

<main class="container my-5 px-4 px-md-0">
  <div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">
      
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/" class="text-success text-decoration-none">Home</a></li>
          <li class="breadcrumb-item active">Notícia Detalhada</li>
        </ol>
      </nav>

      <header class="mb-5">
        <h1 class="display-4 fw-bold text-petro mb-3">{{ noticia.titulo }}</h1>
        <p class="lead text-secondary">{{ noticia.subtitulo }}</p>
        <div class="d-flex align-items-center text-muted small mt-4">
          <i class="bi bi-person-circle me-2"></i> Por Redação Petro Energy | 
          <i class="bi bi-calendar3 ms-3 me-2"></i> 08 de Maio de 2026
        </div>
      </header>

      <div class="mb-5">
        <img [src]="noticia.imagem" [alt]="noticia.titulo" 
             class="img-fluid rounded shadow-lg w-100" 
             style="max-height: 500px; object-fit: cover;">
        <p class="text-center text-muted small mt-2 italic">Registro oficial do projeto de expansão Petro Energy.</p>
      </div>

      <article class="noticia-texto">
        <p class="paragrafo-destaque">{{ noticia.texto }}</p>
        
        <h3 class="mt-5 mb-3 text-petro">Diferenciais Técnicos</h3>
        <p>{{ noticia.detalhes }}</p>

        <div class="card-impacto my-5">
          <h4 class="text-white mb-2"><i class="bi bi-graph-up-arrow me-2"></i> Impacto Esperado</h4>
          <p class="mb-0 text-white-50">{{ noticia.impacto }}</p>
        </div>
      </article>

      <footer class="border-top pt-4 mt-5">
        <button routerLink="/" class="btn btn-petro btn-lg shadow-sm">
          <i class="bi bi-arrow-left"></i> Voltar para Home
        </button>
      </footer>

    </div>
  </div>
</main>
